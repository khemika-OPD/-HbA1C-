<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HbA1C Converter - Khemika OPD Takhli</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a3a5a; --accent: #9b59b6; --bg: #f4f7f6; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 15px; display: flex; justify-content: center; }
        .card { max-width: 450px; width: 100%; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid var(--primary); }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .header h2 { color: var(--primary); margin: 0; font-size: 1.4rem; }
        .header p { font-size: 0.8rem; color: #666; font-weight: bold; margin: 5px 0 0; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 1.1rem; box-sizing: border-box; text-align: center; }
        
        .result-box { background: #f8f9fa; padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; border: 1px solid #ddd; }
        .res-value { font-size: 2.5rem; font-weight: bold; color: var(--accent); margin: 5px 0; }
        .interpretation { font-weight: bold; padding: 10px; border-radius: 8px; margin-top: 10px; }
        
        .footer { text-align: center; font-size: 0.7rem; color: #888; margin-top: 25px; font-weight: bold; }
        .btn-reset { width: 100%; padding: 12px; background: #6c757d; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>HbA1C & eAG Converter</h2>
        <p>Khemika-OPD Takhli Digital Toolkit</p>
    </div>

    <div class="input-group">
        <label>ป้อนค่าน้ำตาลเฉลี่ย (eAG) เพื่อหา HbA1C:</label>
        <input type="number" id="eag_input" placeholder="หน่วย mg/dL" oninput="calcA1c()">
    </div>

    <div class="input-group">
        <label>หรือป้อน HbA1C (%) เพื่อหาค่าน้ำตาล:</label>
        <input type="number" id="a1c_input" step="0.1" placeholder="หน่วย %" oninput="calcEag()">
    </div>

    <div class="result-box" id="resultArea">
        <div id="label_res">กรุณากรอกตัวเลข</div>
        <div class="res-value" id="val_res">--</div>
        <div id="interpret" class="interpretation"></div>
    </div>

    <button class="btn-reset" onclick="resetForm()">ล้างข้อมูล</button>

    <div class="footer">
        อ้างอิงสูตร ADAG: eAG = 28.7 × HbA1c – 46.7<br>
        © 2026 Innovation by Khemika
    </div>
</div>

<script>
    function calcA1c() {
        const eag = parseFloat(document.getElementById('eag_input').value);
        const a1cInput = document.getElementById('a1c_input');
        
        if (eag > 0) {
            const a1c = (eag + 46.7) / 28.7;
            a1cInput.value = ""; // เคลียร์ช่องอีกฝั่ง
            showResult(a1c.toFixed(1), "HbA1C (%)", a1c);
        }
    }

    function calcEag() {
        const a1c = parseFloat(document.getElementById('a1c_input').value);
        const eagInput = document.getElementById('eag_input');
        
        if (a1c > 0) {
            const eag = (28.7 * a1c) - 46.7;
            eagInput.value = ""; // เคลียร์ช่องอีกฝั่ง
            showResult(Math.round(eag), "น้ำตาลเฉลี่ย (mg/dL)", a1c);
        }
    }

    function showResult(val, label, a1cVal) {
        document.getElementById('label_res').innerText = label;
        document.getElementById('val_res').innerText = val;
        
        const interpret = document.getElementById('interpret');
        let text = "";
        let color = "";
        let bgColor = "";

        // เกณฑ์แปลผล HbA1C
        if (a1cVal < 5.7) {
            text = "ปกติ (Normal)";
            color = "#155724"; bgColor = "#d4edda";
        } else if (a1cVal >= 5.7 && a1cVal <= 6.4) {
            text = "กลุ่มเสี่ยงเบาหวาน (Pre-diabetes)";
            color = "#856404"; bgColor = "#fff3cd";
        } else {
            text = "เกณฑ์วินิจฉัยเบาหวาน (Diabetes)";
            color = "#721c24"; bgColor = "#f8d7da";
        }

        interpret.innerText = text;
        interpret.style.color = color;
        interpret.style.backgroundColor = bgColor;
    }

    function resetForm() {
        document.getElementById('eag_input').value = "";
        document.getElementById('a1c_input').value = "";
        document.getElementById('val_res').innerText = "--";
        document.getElementById('label_res').innerText = "กรุณากรอกตัวเลข";
        document.getElementById('interpret').innerText = "";
        document.getElementById('interpret').style.backgroundColor = "transparent";
    }
</script>

</body>
</html>
