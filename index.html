<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HbA1C Converter - Khemika OPD Takhli</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-grad: linear-gradient(135deg, #6B8DD6 0%, #8E37D7 100%);
            --bg: #f8f9fa; 
        }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 15px; display: flex; justify-content: center; }
        
        .card { 
            max-width: 450px; width: 100%; background: white; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; border: none;
        }

        /* ส่วนหัวสีสันสดใส */
        .header { 
            background: var(--primary-grad); color: white; padding: 30px 20px; 
            text-align: center; border-radius: 0 0 25px 25px;
        }
        .header h2 { margin: 0; font-size: 1.6rem; letter-spacing: 1px; }
        .header p { font-size: 0.85rem; margin: 8px 0 0; opacity: 0.9; font-weight: bold; }
        
        .content { padding: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #444; font-size: 0.95rem; }
        
        input[type="number"] { 
            width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; 
            font-size: 1.2rem; box-sizing: border-box; text-align: center; transition: 0.3s;
            background: #fafafa;
        }
        input[type="number"]:focus { border-color: #764ba2; outline: none; background: white; box-shadow: 0 0 10px rgba(118,75,162,0.1); }
        
        .result-box { 
            background: #ffffff; padding: 25px; border-radius: 20px; text-align: center; 
            margin-top: 10px; border: 2px dashed #ddd; transition: 0.5s;
        }
        .label-res { font-size: 0.9rem; color: #666; font-weight: bold; text-transform: uppercase; }
        .res-value { font-size: 3.5rem; font-weight: 900; margin: 10px 0; background: var(--secondary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .interpretation { font-weight: bold; padding: 12px; border-radius: 12px; margin-top: 15px; font-size: 1rem; }
        
        .btn-reset { 
            width: 100%; padding: 15px; background: #f1f2f6; color: #555; border: none; 
            border-radius: 15px; cursor: pointer; margin-top: 20px; font-weight: bold; transition: 0.2s;
        }
        .btn-reset:hover { background: #dfe4ea; }

        .footer { text-align: center; font-size: 0.75rem; color: #999; margin-top: 25px; line-height: 1.5; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>HbA1C & eAG Tools</h2>
        <p>Khemika-OPD Takhli Digital Toolkit</p>
    </div>

    <div class="content">
        <div class="input-group">
            <label>💧 ป้อนค่าน้ำตาลเฉลี่ย (eAG) เพื่อหา HbA1C:</label>
            <input type="number" id="eag_input" placeholder="หน่วย mg/dL" oninput="calcA1c()">
        </div>

        <div class="input-group" style="text-align: center; color: #ccc;"> ─── หรือ ─── </div>

        <div class="input-group">
            <label>🧪 ป้อน HbA1C (%) เพื่อหาค่าน้ำตาลเฉลี่ย:</label>
            <input type="number" id="a1c_input" step="0.1" placeholder="หน่วย %" oninput="calcEag()">
        </div>

        <div class="result-box" id="resultArea">
            <div id="label_res" class="label-res">ผลลัพธ์การคำนวณ</div>
            <div class="res-value" id="val_res">--</div>
            <div id="interpret" class="interpretation"></div>
        </div>

        <button class="btn-reset" onclick="resetForm()">ล้างข้อมูล/คำนวณใหม่</button>

        <div class="footer">
            สูตร ADAG: eAG = 28.7 × HbA1c – 46.7<br>
            Smart Nursing Innovation by Khemika
        </div>
    </div>
</div>

<script>
    function calcA1c() {
        const eag = parseFloat(document.getElementById('eag_input').value);
        const a1cInput = document.getElementById('a1c_input');
        if (eag > 0) {
            const a1c = (eag + 46.7) / 28.7;
            a1cInput.value = ""; 
            showResult(a1c.toFixed(1), "ประมาณค่า HbA1C ได้", a1c);
        }
    }

    function calcEag() {
        const a1c = parseFloat(document.getElementById('a1c_input').value);
        const eagInput = document.getElementById('eag_input');
        if (a1c > 0) {
            const eag = (28.7 * a1c) - 46.7;
            eagInput.value = ""; 
            showResult(Math.round(eag), "น้ำตาลเฉลี่ย (eAG) คือ", a1c);
        }
    }

    function showResult(val, label, a1cVal) {
        document.getElementById('label_res').innerText = label;
        document.getElementById('val_res').innerText = val;
        const interpret = document.getElementById('interpret');
        let text = ""; let color = ""; let bgColor = "";

        if (a1cVal < 5.7) {
            text = "✅ ปกติ (Normal)"; color = "#155724"; bgColor = "#d4edda";
        } else if (a1cVal >= 5.7 && a1cVal <= 6.4) {
            text = "⚠️ กลุ่มเสี่ยง (Pre-diabetes)"; color = "#856404"; bgColor = "#fff3cd";
        } else {
            text = "🚨 เกณฑ์เบาหวาน (Diabetes)"; color = "#721c24"; bgColor = "#f8d7da";
        }
        interpret.innerText = text;
        interpret.style.color = color;
        interpret.style.backgroundColor = bgColor;
    }

    function resetForm() {
        document.getElementById('eag_input').value = "";
        document.getElementById('a1c_input').value = "";
        document.getElementById('val_res').innerText = "--";
        document.getElementById('label_res').innerText = "ผลลัพธ์การคำนวณ";
        document.getElementById('interpret').innerText = "";
        document.getElementById('interpret').style.backgroundColor = "transparent";
    }
</script>

</body>
</html>
