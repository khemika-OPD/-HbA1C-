<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HbA1c to eAG Calculator - Khemika-OPD Takhli</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #8b5cf6; --secondary: #f59e0b; --bg: #faf5ff; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; max-width: 420px; width: 100%; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #f3e8ff; }
        .header { background: linear-gradient(135deg, #8b5cf6 0%, #f59e0b 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; }
        .content { padding: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #5b21b6; }
        input { width: 100%; padding: 15px; border: 2px solid #ddd6fe; border-radius: 12px; box-sizing: border-box; font-size: 22px; text-align: center; color: #4c1d95; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); }
        .calc-btn { width: 100%; padding: 18px; background: linear-gradient(to right, #8b5cf6, #f59e0b); color: white; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .calc-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3); }
        #result-box { margin-top: 25px; padding: 20px; border-radius: 15px; text-align: center; display: none; }
        .eag-val { font-size: 36px; font-weight: bold; margin: 5px 0; }
        .qr-section { text-align: center; padding: 15px; border-top: 1px dashed #ddd; }
        .footer { background: #f8fafc; padding: 20px; text-align: center; font-size: 14px; color: #64748b; }
        .dev-name { color: #8b5cf6; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>HbA1c to eAG</h1>
        <p>แปลงค่าน้ำตาลสะสมเป็นค่าเฉลี่ย</p>
    </div>
    <div class="content">
        <div class="input-group">
            <label>ระบุค่า HbA1c (%)</label>
            <input type="number" id="hba1c" step="0.1" placeholder="เช่น 7.0">
        </div>
        <button class="calc-btn" onclick="calculateEAG()">คำนวณค่า eAG</button>
        <div id="result-box">
            <div style="font-size: 16px; color: #666;">น้ำตาลเฉลี่ยในเลือดสะสม (eAG)</div>
            <div id="eag-display" class="eag-val"></div>
            <div id="eag-status" style="font-weight: bold; font-size: 18px;"></div>
        </div>
    </div>
    <div class="qr-section">
        <button onclick="toggleQR()" style="border:none; background:none; cursor:pointer; color:#94a3b8; font-size:12px;">[ แสดง/ซ่อน QR Code ]</button>
        <div id="qr-cont" style="display:none; justify-content:center; margin-top:10px;"><div id="qrcode"></div></div>
    </div>
    <div class="footer">พัฒนาโดย <span class="dev-name">Khemika-OPD Takhli</span></div>
</div>

<script>
    function calculateEAG() {
        const hba1c = parseFloat(document.getElementById('hba1c').value);
        if(!hba1c || hba1c <= 0) { alert("กรุณากรอกค่า HbA1c ให้ถูกต้องค่ะ"); return; }

        // Formula: eAG = (28.7 * HbA1c) - 46.7
        const eag = (28.7 * hba1c) - 46.7;
        const resVal = Math.round(eag);

        const resBox = document.getElementById('result-box');
        let status = "", color = "", bg = "";

        if (hba1c < 5.7) {
            status = "ปกติ (Normal)";
            color = "#155724"; bg = "#d4edda";
        } else if (hba1c <= 6.4) {
            status = "เสี่ยงเบาหวาน (Pre-diabetes)";
            color = "#856404"; bg = "#fff3cd";
        } else {
            status = "เป็นเบาหวาน (Diabetes)";
            color = "#b91c1c"; bg = "#fee2e2";
        }

        resBox.style.display = "block";
        resBox.style.backgroundColor = bg;
        document.getElementById('eag-display').innerText = resVal + " mg/dL";
        document.getElementById('eag-display').style.color = color;
        document.getElementById('eag-status').innerText = status;
        document.getElementById('eag-status').style.color = color;
    }

    new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 120, height: 120 });
    function toggleQR() {
        let x = document.getElementById("qr-cont");
        x.style.display = (x.style.display === "none") ? "flex" : "none";
    }
</script>
</body>
</html>
